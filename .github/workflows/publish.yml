name: Publish Python Package

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Require release changelog form
      run: |
        if grep -q TBD changelog.md; then false; fi

  tests:
    runs-on: ubuntu-latest
    needs: [docs]
    continue-on-error: true

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Start MySQL
      run: |
        sudo /etc/init.d/mysql start

    - name: Install dependencies
      run: uv sync --all-extras -p ${{ matrix.python-version }}

    - name: Wait for MySQL connection
      run: |
        while ! mysqladmin ping --host=localhost --port=3306 --user=root --password=root --silent; do
          sleep 5
        done

    - name: Pytest / behave
      env:
        PYTEST_PASSWORD: root
        PYTEST_HOST: 127.0.0.1
      run: |
        uv run tox -e py${{ matrix.python-version }}

      # arguably this should be made identical to CI for PRs
    - name: Run Style Checks
      run: uv run tox -e style

  tests-macos:
    name: Tests macOS
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up MySQL
      run: |
        brew install mysql

    - name: Start MySQL
      run: |
        brew services start mysql

    - name: Install dependencies
      run: uv sync --all-extras -p ${{ matrix.python-version }}

    - name: Wait for MySQL connection
      run: |
        while ! mysqladmin ping --host=localhost --port=3306 --user=root --silent; do
          sleep 5
        done

    - name: Set MySQL test credentials
      run: |
        $(brew --prefix mysql)/bin/mysqladmin --host=localhost --port=3306 --user=root password root

    - name: Pytest / behave
      env:
        PYTEST_PASSWORD: root
        PYTEST_HOST: 127.0.0.1
        TERM: xterm
      run: |
        uv run tox -e py${{ matrix.python-version }}

  tests-windows:
    name: Tests Windows
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: 'latest'

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      shell: cmd
      run: uv sync --all-extras -p ${{ matrix.python-version }}

    - name: Set up MySQL
      uses: shogo82148/actions-setup-mysql@076e636c45996ec8cb1a455c65f9f5364aeebd8a # v1.52.1
      with:
        mysql-version: '9.7'
        root-password: root

    - name: Run pytest
      env:
        PYTEST_PASSWORD: root
        PYTEST_HOST: 127.0.0.1
      run: |
        uv run -- coverage run -m pytest
        uv run -- coverage report -m --sort=Miss --skip-covered --skip-empty

  tests-wsl:
    name: Tests WSL
    runs-on: windows-latest

    steps:
    - uses: vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
      with:
        distribution: Ubuntu-24.04
        update: 'true'
        additional-packages: |
          curl
          git
          mysql-server
          pkg-config
          build-essential
          python3-pip

    - name: Create working directory
      shell: wsl-bash {0}
      run: |
        mkdir -p /root/mycli

    - uses: ubuntu/wsl/.github/actions/wsl-checkout@f861f1083e518354e4c3637b08c0edfcf8bc3d51
      with:
        distro: Ubuntu-24.04
        working-dir: /root/mycli

    - name: Install uv
      shell: wsl-bash {0}
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        env PYTHONPATH=/usr/local/lib/python3.14/site-packages pip install --upgrade --break-system-packages --prefix=/usr uv

    - name: Install dependencies
      shell: wsl-bash {0}
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        cd /root/mycli
        uv sync --all-extras --python 3.14

    - name: Start MySQL in WSL
      shell: wsl-bash {0}
      run: |
        sudo service mysql start

    - name: Wait for MySQL connection
      shell: wsl-bash {0}
      run: |
        while ! mysqladmin ping --host=localhost --port=3306 --user=root --silent; do
          sleep 5
        done

    - name: Set up MySQL
      shell: wsl-bash {0}
      run: |
        mysqladmin -u root password root

    - name: Run pytest
      shell: wsl-bash {0}
      env:
        PYTEST_HOST: 127.0.0.1
        PYTEST_USER: root
        PYTEST_PASSWORD: root
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        cd /root/mycli
        uv run --python 3.14 -- coverage run -m pytest
        uv run --python 3.14 -- coverage report -m --sort=Miss --skip-covered --skip-empty

  build:
    runs-on: ubuntu-latest
    needs: [tests, tests-macos, tests-windows, tests-wsl]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: uv sync --all-extras -p 3.14

    - name: Build
      run: uv build

    - name: Store the distribution packages
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: python-packages
        path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    environment: release
    permissions:
      id-token: write
    steps:
    - name: Download distribution packages
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-packages
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
