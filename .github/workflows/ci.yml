name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.rst'
      - 'LICENSE.txt'
      - 'doc/**/*.txt'
      - '**/AUTHORS'
      - '**/SPONSORS'
      - '**/TIPS'

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Start MySQL
        run: |
          sudo /etc/init.d/mysql start

      - name: Install dependencies
        run: uv sync --all-extras -p ${{ matrix.python-version }}

      - name: Wait for MySQL connection
        run: |
          while ! mysqladmin ping --host=localhost --port=3306 --user=root --password=root --silent; do
            sleep 5
          done

      - name: Pytest / behave
        env:
          PYTEST_PASSWORD: root
          PYTEST_HOST: 127.0.0.1
          TERM: xterm
        run: |
          uv run tox -e py${{ matrix.python-version }}

  tests-macos:
    name: Tests macOS
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up MySQL
        run: |
          brew install mysql

      - name: Start MySQL
        run: |
          brew services start mysql

      - name: Install dependencies
        run: uv sync --all-extras -p ${{ matrix.python-version }}

      - name: Wait for MySQL connection
        run: |
          while ! mysqladmin ping --host=localhost --port=3306 --user=root --silent; do
            sleep 5
          done

      - name: Set MySQL test credentials
        run: |
          $(brew --prefix mysql)/bin/mysqladmin --host=localhost --port=3306 --user=root password root

      - name: Pytest / behave
        env:
          PYTEST_PASSWORD: root
          PYTEST_HOST: 127.0.0.1
          TERM: xterm
        run: |
          uv run tox -e py${{ matrix.python-version }}

  tests-windows:
    name: Tests Windows
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 'latest'

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: cmd
        run: uv sync --all-extras -p ${{ matrix.python-version }}

      - name: Set up MySQL
        uses: shogo82148/actions-setup-mysql@c80f44ab210a360ef966c5b9f48a2ae21123b533 # v1.51.0
        with:
          mysql-version: '9.7'
          root-password: root

      - name: Run pytest
        env:
          PYTEST_PASSWORD: root
          PYTEST_HOST: 127.0.0.1
        run: |
          uv run -- coverage run -m pytest
          uv run -- coverage report -m --sort=Miss --skip-covered --skip-empty

  tests-wsl:
    name: Tests WSL
    runs-on: windows-latest

    steps:
      - uses: vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
        with:
          distribution: Ubuntu-24.04
          update: 'true'
          additional-packages: |
            curl
            git
            mysql-server
            pkg-config
            build-essential
            python3-pip

      - name: Create working directory
        shell: wsl-bash {0}
        run: |
          mkdir -p /root/mycli

      - uses: ubuntu/wsl/.github/actions/wsl-checkout@c23a4a0b03292618a19966ec299b799417d25580
        with:
          distro: Ubuntu-24.04
          working-dir: /root/mycli

      - name: Install uv
        shell: wsl-bash {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          env PYTHONPATH=/usr/local/lib/python3.14/site-packages pip install --upgrade --break-system-packages --prefix=/usr uv

      - name: Install dependencies
        shell: wsl-bash {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd /root/mycli
          uv sync --all-extras --python 3.14

      - name: Start MySQL in WSL
        shell: wsl-bash {0}
        run: |
          sudo service mysql start

      - name: Wait for MySQL connection
        shell: wsl-bash {0}
        run: |
          while ! mysqladmin ping --host=localhost --port=3306 --user=root --silent; do
            sleep 5
          done

      - name: Set up MySQL
        shell: wsl-bash {0}
        run: |
          mysqladmin -u root password root

      - name: Run pytest
        shell: wsl-bash {0}
        env:
          PYTEST_HOST: 127.0.0.1
          PYTEST_USER: root
          PYTEST_PASSWORD: root
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd /root/mycli
          uv run --python 3.14 -- coverage run -m pytest
          uv run --python 3.14 -- coverage report -m --sort=Miss --skip-covered --skip-empty

  test-no-extras:
    name: Tests Without Extras
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Start MySQL
        run: |
          sudo /etc/init.d/mysql start

      - name: Install dependencies
        run: uv sync --extra dev -p python3.14

      - name: Wait for MySQL connection
        run: |
          while ! mysqladmin ping --host=localhost --port=3306 --user=root --password=root --silent; do
            sleep 5
          done

      - name: Pytest / behave
        env:
          PYTEST_PASSWORD: root
          PYTEST_HOST: 127.0.0.1
          TERM: xterm
        run: |
          uv run tox -e py3.14
